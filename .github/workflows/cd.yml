name: Android CD (Deploy to Firebase)

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties
        env:
          SECRET_KEY: ${{ secrets.MAPS_API_KEY }}
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "NOM_DE_TA_CLE_D_API=$SECRET_KEY" >> local.properties

      - name: Decode Google Services JSON
        env:
          GOOGLE_SERVICES_SECRET: ${{ secrets.GOOGLE_SERVICES_BASE64 }}
        run: echo "$GOOGLE_SERVICES_SECRET" | base64 --decode > app/google-services.json

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload artifact to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1.7.0
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_CREDENTIALS }}
          groups: testers
          file: app/build/outputs/apk/release/app-release.apk