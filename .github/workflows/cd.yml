name: Android CD (Deploy to Firebase)

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties
        env:
          SECRET_KEY: ${{ secrets.MAPS_API_KEY }}
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "MAPS_API_KEY=$SECRET_KEY" >> local.properties

      - name: Decode Google Services JSON
        env:
          GOOGLE_SERVICES_SECRET: ${{ secrets.GOOGLE_SERVICES_BASE64 }}
        run: echo "$GOOGLE_SERVICES_SECRET" | base64 --decode > app/google-services.json

      - name: Décoder le Keystore Android
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE" | base64 --decode > keystore_file

      - name: Build Release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/keystore_file
          ANDROID_STORE_PASS: ${{ secrets.ANDROID_STORE_PASS }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASS: ${{ secrets.ANDROID_RELEASE_KEY_PASS }}
        run: ./gradlew assembleRelease

      - name: Upload artifact to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@bd494989dd4bec0343f78adee87fe66e48279ad6
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_CREDENTIALS }}
          groups: testers
          file: app/build/outputs/apk/release/app-release.apk