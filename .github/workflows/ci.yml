name: Android CI

on:
  pull_request:
    branches: ["main"]

jobs:
    build-and-test:
      runs-on: ubuntu-latest

      steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Create local.properties
        env:
          SECRET_KEY: ${{ secrets.MAPS_API_KEY }}
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "MAPS_API_KEY=$SECRET_KEY" >> local.properties

      - name: Decode Google Services
        env:
          GOOGLE_SERVICES_SECRET: ${{ secrets.GOOGLE_SERVICES_BASE64 }}
        run: echo "$GOOGLE_SERVICES_SECRET" | base64 --decode > app/google-services.json

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Emulator, Tests & Sonar
        uses: reactivecircus/android-emulator-runner@6b0df40cd23605e62e0024acd7f72211a7e2887d
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          api-level: 29
          script: ./gradlew jacocoTestReport sonar


